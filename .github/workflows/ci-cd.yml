name: CI/CD Pipeline with Self-Hosted Runner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ========== JOB 1: СБОРКА ==========
  build:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Build
      run: |
        make clean
        make
        ls -la fibonacci
    
    - name: Upload artifact (executable)
      uses: actions/upload-artifact@v4
      with:
        name: fibonacci-executable
        path: fibonacci
        if-no-files-found: error

  # ========== JOB 2: ТЕСТИРОВАНИЕ ==========
  test:
    runs-on: self-hosted
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: fibonacci-executable
        path: ./
    
    - name: Make executable
      run: chmod +x fibonacci
    
    - name: Run tests
      run: make test
      continue-on-error: false

  # ========== JOB 3: УПАКОВКА В DEB-ПАКЕТ ==========
  package:
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make dpkg-dev
    
    - name: Build executable
      run: |
        make clean
        make
        ls -la fibonacci
    
    - name: Create DEB package structure
      run: |
        # Создаем структуру директорий
        mkdir -p debian/DEBIAN
        mkdir -p debian/usr/local/bin
        mkdir -p debian/usr/share/doc/fibonacci
        
        # Копируем исполняемый файл
        cp fibonacci debian/usr/local/bin/
        
        # Создаем control файл
        cat > debian/DEBIAN/control << 'EOF'
        Package: fibonacci
        Version: 1.0.0
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: GitHub Actions <actions@github.com>
        Description: Fibonacci calculator
         Программа для вычисления чисел Фибоначчи
         Собрано автоматически в GitHub Actions
        Depends: libc6 (>= 2.29)
        EOF
        
        # Создаем README
        cat > debian/usr/share/doc/fibonacci/README << 'EOF'
        Fibonacci Calculator
        
        Программа вычисляет n-е число Фибоначчи.
        Поддерживает n от 0 до 50.
        
        Запустите программу командой: fibonacci
        EOF
        
        # Создаем postinst скрипт (выполняется после установки)
        cat > debian/DEBIAN/postinst << 'EOF'
        #!/bin/sh
        set -e
        echo "========================================="
        echo "Fibonacci Calculator успешно установлен!"
        echo "========================================="
        echo "Запустите программу командой: fibonacci"
        echo "========================================="
        exit 0
        EOF
        chmod 755 debian/DEBIAN/postinst
    
    - name: Build DEB package
      run: |
        dpkg-deb --build debian fibonacci_1.0.0_amd64.deb
        echo "DEB package created successfully!"
    
    - name: Verify DEB package
      run: |
        dpkg-deb --info fibonacci_1.0.0_amd64.deb
        dpkg-deb --contents fibonacci_1.0.0_amd64.deb
    
    - name: Upload DEB package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: fibonacci-deb-package
        path: "*.deb"
        if-no-files-found: error
