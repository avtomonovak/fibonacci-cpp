name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Сборка
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Build
      run: |
        make clean
        make
        ls -la fibonacci
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: fibonacci
        path: fibonacci

  # Job 2: Тестирование
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Run tests
      run: |
        make test
      continue-on-error: false

  # Job 3: Создание deb-пакета
  package:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make dpkg-dev
    
    - name: Build
      run: make
    
    - name: Create deb package
      run: |
        mkdir -p debian/DEBIAN
        mkdir -p debian/usr/local/bin
        cp fibonacci debian/usr/local/bin/
        
        cat > debian/DEBIAN/control << EOF
        Package: fibonacci
        Version: 1.0.0-${{ github.sha }}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: GitHub Actions <actions@github.com>
        Description: Fibonacci calculator
         Automatically built by GitHub Actions
        EOF
        
        dpkg-deb --build debian fibonacci_1.0.0-${{ github.sha }}_amd64.deb
    
    - name: Upload deb package
      uses: actions/upload-artifact@v3
      with:
        name: fibonacci-deb
        path: "*.deb"name: CI/CD Pipeline

