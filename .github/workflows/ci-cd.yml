name: CI/CD Pipeline with Self-Hosted Runner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  # Job 1: Build
  build:
    runs-on: self-hosted  # <-- ЭТО КЛЮЧЕВАЯ СТРОКА!
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Build
      run: |
        make clean
        make
        ls -la fibonacci
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: fibonacci
        path: fibonacci

  # Job 2: Test
  test:
    runs-on: self-hosted  # <-- ТОЖЕ САМОСТОЯТЕЛЬНЫЙ RUNNER
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Run tests
      run: make test
      continue-on-error: false
